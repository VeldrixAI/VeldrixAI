name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SDK deps
        run: cd sdk && pip install -e ".[dev]"
      - name: Run SDK tests
        run: cd sdk && pytest tests/ -v --tb=short

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: cd backend/core && pip install -r requirements.txt
      - name: Run backend tests
        run: cd backend/core && pytest tests/ -v --tb=short
        env:
          NVIDIA_API_KEY: ${{ secrets.NIM_API_KEY }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: cd sdk && ruff check veldrixai/ || true
      - run: cd backend/core && ruff check src/ || true
