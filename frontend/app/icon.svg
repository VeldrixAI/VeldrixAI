<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="vg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="sq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background box -->
  <rect x="4" y="4" width="92" height="92" rx="20" fill="url(#sq)" stroke="url(#vg1)" stroke-width="1.5"/>
  <!-- Diamond accent -->
  <path d="M50 14 L86 50 L50 86 L14 50 Z" fill="none" stroke="url(#vg1)" stroke-width="0.8" stroke-opacity="0.25"/>
  <!-- V stroke -->
  <path d="M22 28 L50 72 L78 28" fill="none" stroke="url(#vg2)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Dot outer -->
  <circle cx="50" cy="72" r="6" fill="url(#vg1)" filter="url(#glow2)"/>
  <!-- Dot inner -->
  <circle cx="50" cy="72" r="3" fill="white" opacity="0.95"/>
  <!-- Wing accents -->
  <rect x="28" y="48" width="14" height="2.5" rx="1.25" fill="#a78bfa" opacity="0.6"/>
  <rect x="58" y="48" width="14" height="2.5" rx="1.25" fill="#67e8f9" opacity="0.6"/>
  <!-- Top tick -->
  <line x1="50" y1="4" x2="50" y2="12" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
